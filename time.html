<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>动画&故事时间</title>

<style>
body {
  font-family: Arial;
  background:#FFF8F0;
  margin:0;
}

.header {
  background:#FF6B35;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.section {
  margin:12px;
  background:white;
  padding:12px;
  border-radius:12px;
}

.title {
  font-weight:bold;
  margin-bottom:8px;
}

.grid {
  display:grid;
  grid-template-columns: repeat(20,1fr);
  gap:3px;
}

.cell {
  aspect-ratio:1;
  border-radius:4px;
}

.free { background:#E8F5E9; }
.used { background:#FF6B35; }

.record {
  display:flex;
  justify-content:space-between;
  padding:8px;
  border-bottom:1px solid #eee;
}

.btn {
  padding:10px;
  background:#FF6B35;
  color:white;
  border:none;
  border-radius:8px;
  width:100%;
  margin-top:10px;
}

</style>
</head>

<body>

<div class="header">时间管理（动画+故事）</div>

<div class="section">
  <div class="title">动画（20分钟）</div>
  <div id="videoGrid" class="grid"></div>
  <div id="videoRemain"></div>
</div>

<div class="section">
  <div class="title">故事（20分钟）</div>
  <div id="audioGrid" class="grid"></div>
  <div id="audioRemain"></div>
</div>

<div class="section">
  <div class="title">记录</div>
  <div id="records"></div>
</div>

<div class="section">
  <button class="btn" onclick="addRecord()">记录时间</button>
</div>

<script>

const VIDEO_MAX = 20;
const AUDIO_MAX = 20;

function todayKey() {
  const d = new Date();
  return `time_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;
}

function load() {
  return JSON.parse(localStorage.getItem(todayKey())) || [];
}

function save(data) {
  localStorage.setItem(todayKey(), JSON.stringify(data));
}

function used(type) {
  return load().filter(r=>r.type===type)
               .reduce((s,r)=>s+r.time,0);
}

function renderGrid(id, usedCount, max) {
  const el = document.getElementById(id);
  el.innerHTML="";
  for(let i=0;i<max;i++){
    const c=document.createElement("div");
    c.className="cell "+(i<usedCount?"used":"free");
    el.appendChild(c);
  }
}

function render() {

  const videoUsed = used("video");
  const audioUsed = used("audio");

  renderGrid("videoGrid", videoUsed, VIDEO_MAX);
  renderGrid("audioGrid", audioUsed, AUDIO_MAX);

  document.getElementById("videoRemain").innerText =
    "剩余："+(VIDEO_MAX-videoUsed)+"分钟";

  document.getElementById("audioRemain").innerText =
    "剩余："+(AUDIO_MAX-audioUsed)+"分钟";

  const list = document.getElementById("records");
  list.innerHTML="";

  load().slice().reverse().forEach(r=>{
    const div=document.createElement("div");
    div.className="record";
    div.innerHTML=`${r.name}（${r.type}） ${r.time}分钟`;
    list.appendChild(div);
  });
}

function addRecord(){

  const type = prompt("输入类型：video 或 audio");
  if(type!=="video" && type!=="audio") return;

  const name = prompt("内容名称");
  const time = parseInt(prompt("用了几分钟"));

  if(!time) return;

  const max = type==="video"?VIDEO_MAX:AUDIO_MAX;
  const now = used(type);

  if(time > max-now){
    alert("时间不够了");
    return;
  }

  const data = load();

  data.push({
    type,
    name,
    time
  });

  save(data);
  render();
}

render();

</script>

</body>
</html>
