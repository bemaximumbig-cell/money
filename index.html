<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>еӯ©еӯҗйӣ¶иҠұй’ұзі»з»ҹ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#fff7ed;color:#1f2937;min-height:100vh;padding-bottom:96px}.top{background:linear-gradient(135deg,#fb923c,#f97316);color:white;padding:22px 16px 18px;border-radius:0 0 28px 28px;box-shadow:0 8px 24px rgba(249,115,22,.25)}.title{font-size:25px;font-weight:900;text-align:center}.sub{font-size:12px;text-align:center;opacity:.85;margin-top:4px}.monthbar{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:14px}.navbtn{width:38px;height:38px;border:0;border-radius:50%;background:rgba(255,255,255,.24);color:white;font-size:26px;font-weight:800}.month{min-width:128px;text-align:center;font-size:17px;font-weight:900}.cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px}.card{background:white;border-radius:18px;padding:14px;text-align:center;box-shadow:0 4px 18px rgba(0,0,0,.06)}.num{font-size:34px;line-height:1;font-weight:900}.green{color:#16a34a}.orange{color:#ea580c}.label{font-size:12px;color:#6b7280;font-weight:700;margin-top:5px}.section{background:white;margin:0 14px 14px;border-radius:22px;padding:14px;box-shadow:0 4px 18px rgba(0,0,0,.06)}.section h2{font-size:14px;color:#6b7280;margin-bottom:12px}.grid{display:grid;grid-template-columns:repeat(10,1fr);gap:4px}.cell{aspect-ratio:1;border-radius:7px;position:relative;overflow:visible}.empty{background:#dcfce7;border:2px solid #86efac}.spent{border:2px solid var(--bd);background:var(--bg)}.cellText{position:absolute;left:2px;top:50%;transform:translateY(-50%);font-size:8px;line-height:1.05;font-weight:900;color:var(--tx);white-space:nowrap;text-shadow:0 1px 0 rgba(255,255,255,.4);z-index:1}.legend{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}.tag{font-size:11px;font-weight:700;background:#f3f4f6;border-radius:999px;padding:6px 8px;display:flex;align-items:center;gap:5px}.dot{width:12px;height:12px;border-radius:4px;background:var(--bg);border:2px solid var(--bd)}.records{display:flex;flex-direction:column;gap:10px}.record{display:flex;align-items:center;gap:9px;border-left:6px solid var(--bd);background:var(--bg);border-radius:15px;padding:11px}.emoji{font-size:22px}.info{flex:1;min-width:0}.name{font-size:15px;font-weight:900;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.date{font-size:11px;color:#6b7280;margin-top:2px}.money{font-size:19px;font-weight:900;color:var(--tx)}.del{border:0;background:rgba(0,0,0,.08);width:30px;height:30px;border-radius:50%;font-size:14px}.emptyState{text-align:center;color:#9ca3af;font-weight:800;padding:28px 0}.add{position:fixed;right:18px;bottom:22px;width:66px;height:66px;border:0;border-radius:50%;background:linear-gradient(135deg,#fb923c,#f97316);color:white;font-size:36px;box-shadow:0 8px 28px rgba(249,115,22,.45)}.tools{display:flex;justify-content:space-between;gap:8px;margin:0 14px 14px}.smallbtn{border:0;border-radius:12px;background:#fff;color:#9ca3af;font-weight:800;padding:10px 12px;box-shadow:0 3px 14px rgba(0,0,0,.05)}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);display:none;align-items:flex-end;z-index:20}.overlay.show{display:flex}.modal{width:100%;background:white;border-radius:26px 26px 0 0;padding:22px 18px 36px}.modal h3{text-align:center;font-size:20px;margin-bottom:18px}.field{margin-bottom:13px}.field label{display:block;font-size:12px;color:#9ca3af;font-weight:900;margin-bottom:6px}.inp{width:100%;border:2px solid #e5e7eb;background:#f9fafb;border-radius:14px;padding:14px;font-size:17px;font-weight:800;outline:none}.inp:focus{border-color:#fb923c;background:white}.emojiGrid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px}.emojiBtn{aspect-ratio:1;border:2px solid transparent;background:#f3f4f6;border-radius:10px;font-size:22px}.emojiBtn.sel{border-color:#f97316;background:#ffedd5}.actions{display:flex;gap:10px;margin-top:18px}.btn{flex:1;border:0;border-radius:15px;padding:15px;font-size:16px;font-weight:900}.cancel{background:#f3f4f6;color:#9ca3af}.ok{background:#f97316;color:white}.err{font-size:12px;font-weight:800;color:#dc2626;margin-top:6px;display:none}.err.show{display:block}.budgetRow{display:flex;gap:8px;align-items:center}.budgetRow input{flex:1}.budgetRow button{border:0;border-radius:12px;background:#f97316;color:white;font-weight:900;padding:13px 12px}.hint{font-size:12px;color:#9ca3af;line-height:1.5;margin-top:8px}
</style>
</head>
<body>
<div class="top"><div class="title">рҹҗ· йӣ¶иҠұй’ұзі»з»ҹ</div><div class="sub">дёҖж ј = 1е…ғпјҢз”ЁйўңиүІзңӢжҮӮй’ұиҠұеҲ°е“ӘйҮҢдәҶ</div><div class="monthbar"><button class="navbtn" id="prev">вҖ№</button><div class="month" id="monthLabel"></div><button class="navbtn" id="next">вҖә</button></div></div>
<div class="cards"><div class="card"><div class="num green" id="remain">100</div><div class="label">иҝҳеү©</div></div><div class="card"><div class="num orange" id="spent">0</div><div class="label">е·ІиҠұ</div></div></div>
<div class="section"><h2>рҹ“Ұ 100дёӘзӣ’еӯҗпјҡйўңиүІи¶ҠеӨҡпјҢиҜҙжҳҺиҠұеҫ—и¶ҠеӨҡ</h2><div class="grid" id="grid"></div><div class="legend" id="legend"></div></div>
<div class="section"><h2>рҹ“қ жң¬жңҲи®°еҪ•</h2><div class="records" id="records"></div></div>
<div class="tools"><button class="smallbtn" id="budgetBtn">и®ҫзҪ®жң¬жңҲйў„з®—</button><button class="smallbtn" id="resetBtn">жё…з©әжң¬жңҲ</button></div>
<button class="add" id="add">пјӢ</button>
<div class="overlay" id="overlay"><div class="modal"><h3>и®°еҪ•дёҖз¬”иҠұй”Җ</h3><div class="field"><label>иҠұдәҶеӨҡе°‘й’ұпјҹ</label><input class="inp" id="amount" type="number" min="1" inputmode="numeric" placeholder="дҫӢеҰӮ 8"><div class="err" id="err"></div></div><div class="field"><label>д№°дәҶд»Җд№Ҳпјҹ</label><input class="inp" id="name" maxlength="12" placeholder="дҫӢеҰӮ еҶ°ж·Үж·ӢгҖҒзҺ©е…·иҪҰ"></div><div class="field"><label>йҖүдёӘеӣҫж Ү</label><div class="emojiGrid" id="emojiGrid"></div></div><div class="actions"><button class="btn cancel" id="cancel">еҸ–ж¶Ҳ</button><button class="btn ok" id="save">и®°дёӢжқҘ</button></div><div class="hint">ж•°жҚ®дјҡдҝқеӯҳеңЁеҪ“еүҚжүӢжңәжөҸи§ҲеҷЁйҮҢгҖӮдёҚиҰҒжё…йҷӨ Safari зҪ‘з«ҷж•°жҚ®гҖӮ</div></div></div>
<script>
const COLORS=[['#fee2e2','#f87171','#991b1b'],['#ffedd5','#fb923c','#9a3412'],['#fef9c3','#facc15','#854d0e'],['#dcfce7','#4ade80','#166534'],['#dbeafe','#60a5fa','#1e3a8a'],['#ede9fe','#a78bfa','#4c1d95'],['#fce7f3','#f472b6','#831843'],['#ccfbf1','#2dd4bf','#134e4a'],['#e0f2fe','#38bdf8','#075985'],['#f3e8ff','#c084fc','#581c87']];
const EMOJIS=['рҹҚҰ','рҹҚ¬','рҹ§Ӣ','рҹҚҹ','рҹҚ•','рҹҚ©','рҹҺ®','рҹҡ—','рҹ§ё','рҹ“ҡ','вңҸпёҸ','рҹҺЁ','рҹҺҜ','рҹҡҖ','рҹҺҒ','рҹҸҖ','рҹҺө','рҹҗұ','рҹҰ–','рҹҢҲ','вӯҗ','рҹҚҺ','рҹҚ“','рҹҺ '];
let y,m,sel=EMOJIS[0];
const $=id=>document.getElementById(id); const key=()=>`allowance_${y}_${m}`; const budgetKey=()=>`allowance_budget_${y}_${m}`;
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function load(){try{return JSON.parse(localStorage.getItem(key()))||[]}catch(e){return[]}}
function saveData(d){localStorage.setItem(key(),JSON.stringify(d))}
function budget(){return parseInt(localStorage.getItem(budgetKey()))||100}
function setBudget(v){localStorage.setItem(budgetKey(),String(v))}
function spent(d){return d.reduce((a,b)=>a+b.amount,0)}
function label(){const ns=['дёҖжңҲ','дәҢжңҲ','дёүжңҲ','еӣӣжңҲ','дә”жңҲ','е…ӯжңҲ','дёғжңҲ','е…«жңҲ','д№қжңҲ','еҚҒжңҲ','еҚҒдёҖжңҲ','еҚҒдәҢжңҲ'];return `${y}е№ҙ ${ns[m]}`}
function render(){const d=load(),b=budget(),s=spent(d);$('monthLabel').textContent=label();$('spent').textContent=s;$('remain').textContent=b-s;renderGrid(d,b);renderRecords(d)}
function renderGrid(d,b){const grid=$('grid'),leg=$('legend');grid.innerHTML='';let cells=[];d.forEach((r,i)=>{for(let j=0;j<r.amount&&cells.length<b;j++)cells.push({r,pos:j,i})});while(cells.length<b)cells.push(null);grid.style.gridTemplateColumns=`repeat(10,1fr)`;cells.forEach(c=>{let el=document.createElement('div');el.className='cell '+(c?'spent':'empty');if(c){let col=COLORS[c.i%COLORS.length];el.style.setProperty('--bg',col[0]);el.style.setProperty('--bd',col[1]);el.style.setProperty('--tx',col[2]);if(c.pos===0){let t=document.createElement('div');t.className='cellText';let nm=c.r.name.length>4?c.r.name.slice(0,4)+'вҖҰ':c.r.name;t.innerHTML=`${esc(c.r.emoji+nm)}<br>ВҘ${c.r.amount}`;el.appendChild(t)}}grid.appendChild(el)});leg.innerHTML='<div class="tag"><span class="dot" style="--bg:#dcfce7;--bd:#86efac"></span>иҝҳжІЎиҠұ</div>';d.forEach((r,i)=>{let col=COLORS[i%COLORS.length],e=document.createElement('div');e.className='tag';e.innerHTML=`<span class="dot" style="--bg:${col[0]};--bd:${col[1]}"></span>${esc(r.emoji+r.name)} ВҘ${r.amount}`;leg.appendChild(e)})}
function renderRecords(d){const box=$('records');if(!d.length){box.innerHTML='<div class="emptyState">рҹҢҹ иҝҳжІЎиҠұй’ұ</div>';return}box.innerHTML='';[...d].reverse().forEach((r,idx)=>{let i=d.findIndex(x=>x.id===r.id),col=COLORS[i%COLORS.length],div=document.createElement('div');div.className='record';div.style.setProperty('--bg',col[0]);div.style.setProperty('--bd',col[1]);div.style.setProperty('--tx',col[2]);div.innerHTML=`<div class="emoji">${r.emoji}</div><div class="info"><div class="name">${esc(r.name)}</div><div class="date">${r.date} В· еҚ  ${r.amount} дёӘзӣ’еӯҗ</div></div><div class="money">ВҘ${r.amount}</div><button class="del" data-id="${r.id}">Г—</button>`;box.appendChild(div)});box.querySelectorAll('.del').forEach(btn=>btn.onclick=()=>{if(confirm('еҲ йҷӨиҝҷжқЎи®°еҪ•пјҹ')){saveData(load().filter(r=>r.id!==btn.dataset.id));render()}})}
function open(){sel=EMOJIS[0];$('amount').value='';$('name').value='';$('err').classList.remove('show');buildEmoji();$('overlay').classList.add('show');setTimeout(()=>$('amount').focus(),200)}
function close(){$('overlay').classList.remove('show')}
function buildEmoji(){const g=$('emojiGrid');g.innerHTML='';EMOJIS.forEach(e=>{let b=document.createElement('button');b.className='emojiBtn '+(e===sel?'sel':'');b.textContent=e;b.onclick=()=>{sel=e;buildEmoji()};g.appendChild(b)})}
$('add').onclick=open;$('cancel').onclick=close;$('overlay').onclick=e=>{if(e.target===$('overlay'))close()};
$('save').onclick=()=>{const amt=parseInt($('amount').value),name=$('name').value.trim()||'иҠұй”Җ',b=budget(),d=load(),left=b-spent(d),err=$('err');if(!amt||amt<1){err.textContent='иҜ·иҫ“е…Ҙжңүж•ҲйҮ‘йўқ';err.classList.add('show');return}if(amt>left){err.textContent=`еҸӘеү© ${left} е…ғпјҢдёҚеӨҹиҝҷз¬”`;err.classList.add('show');return}const now=new Date();d.push({id:String(Date.now()),amount:amt,name,emoji:sel,date:`${now.getMonth()+1}жңҲ${now.getDate()}ж—Ҙ`});saveData(d);close();render()};
$('prev').onclick=()=>{m--;if(m<0){m=11;y--}render()};$('next').onclick=()=>{m++;if(m>11){m=0;y++}render()};
$('resetBtn').onclick=()=>{if(confirm('жё…з©әжң¬жңҲжүҖжңүи®°еҪ•пјҹ')){saveData([]);render()}};
$('budgetBtn').onclick=()=>{let cur=budget(),v=prompt('и®ҫзҪ®жң¬жңҲйў„з®—пјҲе…ғпјү',cur);if(v===null)return;v=parseInt(v);if(!v||v<1)return alert('иҜ·иҫ“е…Ҙжңүж•ҲйҮ‘йўқ');if(spent(load())>v)return alert('йў„з®—дёҚиғҪе°ҸдәҺе·ІиҠұйҮ‘йўқ');setBudget(v);render()};
const now=new Date();y=now.getFullYear();m=now.getMonth();render();
</script>
</body>
</html>
